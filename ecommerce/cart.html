<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/mediaquery.css" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        background-color: #f5f5f5;
      }

      h1 {
        margin-bottom: 30px;
        color: #333;
      }
    </style>
  </head>

  <body>
    <h1>Your Shopping Cart</h1>
    <div class="cart-container" id="cart-container">
      <!-- Cart items will be dynamically added here -->
    </div>
    <div class="summary">Total Amount: ₹<span id="final-total">0</span></div>
    <button class="checkout-btn" onclick="checkout()">
      Proceed to Checkout
    </button>

    <script>
      function renderCart() {
        const cartContainer = document.getElementById("cart-container");
        const cartItems = JSON.parse(localStorage.getItem("cartItems")) || [];
        cartContainer.innerHTML = ""; // Clear existing items
        let total = 0;

        cartItems.forEach((item, index) => {
          const itemTotal = item.price * item.quantity;
          total += itemTotal;

          const cartItem = document.createElement("div");
          cartItem.className = "cart-item";
          cartItem.innerHTML = `
                    <img src="${item.imgURL}" alt="${item.name}" />
                    <div class="cart-details">
                        <h2>${item.name}</h2>
                        <p>Price: ₹<span class="unit-price">${item.price}</span></p>
                        <div class="quantity-control">
                            <button onclick="decreaseQty(${index})"><i class="fa-solid fa-minus"></i></button>
                            <input type="text" value="${item.quantity}" readonly />
                            <button onclick="increaseQty(${index})"><i class="fa-solid fa-plus"></i></button>
                            <button class="remove-btn" onclick="removeItem(${index})"><i class="fa-solid fa-trash"></i></button>
                        </div>
                        <p>Total: ₹<span class="total-price">${itemTotal}</span></p>
                    </div>
                `;
          cartContainer.appendChild(cartItem);
        });

        document.getElementById("final-total").innerText =
          total.toLocaleString("en-IN");
      }

      function increaseQty(index) {
        const cartItems = JSON.parse(localStorage.getItem("cartItems"));
        cartItems[index].quantity++;
        localStorage.setItem("cartItems", JSON.stringify(cartItems));
        renderCart();
      }

      function decreaseQty(index) {
        const cartItems = JSON.parse(localStorage.getItem("cartItems")) || [];
        if (!cartItems[index]) return; // invalid index guard
        if (cartItems[index].quantity > 1) {
          cartItems[index].quantity--;
        } else if (cartItems[index].quantity === 1) {
          // Remove item when quantity would go zero
          cartItems.splice(index, 1);
        } else {
          // quantity is zero or invalid, do nothing
          return;
        }
        localStorage.setItem("cartItems", JSON.stringify(cartItems));
        renderCart();
      }
      function removeItem(index) {
        const cartItems = JSON.parse(localStorage.getItem("cartItems")) || [];
        if (!cartItems[index]) return;
        cartItems.splice(index, 1);
        localStorage.setItem("cartItems", JSON.stringify(cartItems));
        renderCart();
      }

      function checkout() {
        alert("Thank you! Your order has been placed.");
        localStorage.removeItem("cartItems"); // Clear cart after checkout
        renderCart(); // Refresh cart view
      }
      renderCart();
    </script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js"
      integrity="sha512-u3fPA7V8qQmhBPNT5quvaXVa1mnnLSXUep5PS1qo5NRzHwG19aHmNJnj1Q8hpA/nBWZtZD4r4AX6YOt5ynLN2g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
  </body>
</html>
